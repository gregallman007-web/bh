<style>
:root{
  --dark:#28383B; --canvas:#182325; --canvas2:#1e2c2e;
  --panel:#223033; --panel-line:rgba(217,228,226,.12);
  --teal:#4F8F8B; --teal-mid:#7FA9A6; --mist:#D9E4E2; --cream:#F4F2EE;
  --tan:#C9A386; --muted:#8CA0A2; --red:#e2685f;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--canvas);
  font-family:'Open Sans',sans-serif;color:var(--cream);}
#stage{position:fixed;inset:0}
svg{display:block;width:100%;height:100%;cursor:grab}
svg:active{cursor:grabbing}
.serif{font-family:'EB Garamond',serif}

/* links */
.link{fill:none;transition:stroke-opacity .3s ease,stroke .3s ease,stroke-width .3s ease}
.link.proposed{stroke:var(--tan);stroke-width:2.4;stroke-dasharray:7 6;stroke-linecap:round;
  animation:flow 1.1s linear infinite}
@keyframes flow{to{stroke-dashoffset:-26}}
.link.orphan{stroke:var(--red);stroke-dasharray:3 5}

/* nodes */
.node{cursor:pointer}
.node circle{transition:opacity .3s ease,stroke .3s ease,r .3s ease}
.node.gap circle{stroke-dasharray:4 4;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
.warnring{fill:none;stroke:var(--tan);stroke-width:1.6;opacity:0;
  transition:opacity .3s ease;animation:warn 2.4s ease-in-out infinite}
@keyframes warn{0%,100%{stroke-opacity:.35}50%{stroke-opacity:.9}}
.nlabel{font-size:12.5px;font-weight:600;fill:var(--cream);opacity:0;pointer-events:none;
  paint-order:stroke;stroke:var(--canvas);stroke-width:4.5px;transition:opacity .2s ease}
.node.focus .nlabel{font-size:15px;fill:#fff}

/* mode bar */
#modebar{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:8px;background:rgba(34,48,51,.72);backdrop-filter:blur(12px);
  border:1px solid var(--panel-line);border-radius:999px;padding:7px}
.mode{display:flex;align-items:center;gap:11px;padding:10px 20px;border-radius:999px;
  cursor:pointer;color:var(--muted);border:none;background:transparent;font:inherit;
  transition:background .3s ease,color .3s ease}
.mode:hover{color:var(--cream)}
.mode.active{background:var(--teal);color:#fff}
.mode .num{font-family:'EB Garamond',serif;font-style:italic;font-size:19px;opacity:.85}
.mode .lbl{font-size:13.5px;font-weight:600;white-space:nowrap}
@media(max-width:1100px){.mode .lbl{display:none}}

/* header brand */
#brand{position:fixed;top:26px;left:30px;z-index:10;display:flex;align-items:center;gap:16px}
#brand img{height:38px;width:auto;display:block}
#backlink{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--muted);
  font-size:12.5px;font-weight:600;letter-spacing:.04em;border-left:1px solid var(--panel-line);
  padding-left:16px;transition:color .2s ease}
#backlink:hover{color:var(--tan)}

/* caption + stats bottom */
#readout{position:fixed;left:30px;bottom:30px;z-index:10;max-width:520px;pointer-events:none}
#kicker{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tan);margin-bottom:12px}
#caption{font-family:'EB Garamond',serif;font-size:32px;line-height:1.22;color:var(--cream);margin:0 0 20px;text-wrap:balance}
#stats{display:flex;gap:34px;pointer-events:auto}
.stat .v{font-family:'EB Garamond',serif;font-size:40px;line-height:1;color:var(--teal-mid)}
.stat .k{font-size:12px;color:var(--muted);margin-top:6px;max-width:12em}

/* legend */
#legend{position:fixed;left:50%;transform:translateX(-50%);bottom:64px;z-index:9;display:none;flex-wrap:wrap;
  justify-content:center;gap:8px;max-width:70vw}
.chip{display:flex;align-items:center;gap:8px;background:rgba(34,48,51,.7);
  border:1px solid var(--panel-line);border-radius:999px;padding:6px 13px 6px 10px;
  font-size:12px;font-weight:600;cursor:pointer;color:var(--mist);
  transition:opacity .2s ease,background .2s ease}
.chip .dot{width:11px;height:11px;border-radius:50%;flex:none}
.chip.dim{opacity:.32}

/* search */
#search{position:fixed;top:26px;right:30px;z-index:10}
#search input{width:250px;background:rgba(34,48,51,.72);backdrop-filter:blur(12px);
  border:1px solid var(--panel-line);border-radius:999px;padding:12px 20px;color:var(--cream);
  font:inherit;font-size:14px;outline:none;transition:border-color .2s ease}
#search input:focus{border-color:var(--teal)}
#search input::placeholder{color:var(--muted)}
#results{position:absolute;top:52px;right:0;width:340px;background:var(--panel);
  border:1px solid var(--panel-line);border-radius:14px;overflow:hidden;display:none;
  max-height:60vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.res{padding:11px 16px;font-size:13.5px;cursor:pointer;border-bottom:1px solid var(--panel-line);
  display:flex;align-items:center;gap:10px}
.res:hover{background:rgba(79,143,139,.18)}
.res .d{width:9px;height:9px;border-radius:50%;flex:none}
.res .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* detail panel */
#detail{position:fixed;top:0;right:0;height:100%;width:420px;background:var(--panel);
  border-left:1px solid var(--panel-line);z-index:20;transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.1,1);padding:38px 36px;overflow-y:auto;
  box-shadow:-30px 0 60px rgba(0,0,0,.35)}
#detail.open{transform:none}
#detclose{position:absolute;top:26px;right:28px;background:none;border:none;color:var(--muted);
  font-size:26px;cursor:pointer;line-height:1}
#detclose:hover{color:var(--cream)}
#detcluster{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
#detcluster .dot{width:12px;height:12px;border-radius:50%}
#dettitle{font-family:'EB Garamond',serif;font-size:34px;line-height:1.15;margin:0 0 8px}
#detpath{font-size:12.5px;color:var(--teal-mid);word-break:break-all;margin-bottom:28px;
  font-family:ui-monospace,'SF Mono',Menlo,monospace}
.detrow{display:flex;gap:16px;margin-bottom:24px}
.detbox{flex:1;background:var(--canvas2);border-radius:14px;padding:18px 20px}
.detbox .v{font-family:'EB Garamond',serif;font-size:30px;color:var(--teal-mid);line-height:1}
.detbox .k{font-size:11.5px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.08em}
.detlabel{font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--tan);margin:0 0 12px}
#detissues{list-style:none;padding:0;margin:0 0 28px;display:flex;flex-direction:column;gap:9px}
#detissues li{background:rgba(226,104,95,.12);color:#f0b3ad;border-radius:10px;
  padding:10px 14px;font-size:13px}
#detissues li.clean{background:rgba(79,143,139,.14);color:var(--teal-mid)}
#detmeta{font-size:14px;line-height:1.6;color:var(--mist)}

/* CTA chart */
#cta{position:fixed;right:30px;bottom:30px;z-index:9;width:330px;background:rgba(34,48,51,.82);
  backdrop-filter:blur(12px);border:1px solid var(--panel-line);border-radius:18px;
  padding:24px 26px;display:none}
#cta h4{margin:0 0 4px;font-family:'EB Garamond',serif;font-weight:500;font-size:22px;color:var(--cream)}

/* journey card overlay */
#journey{position:fixed;left:50%;bottom:130px;transform:translate(-50%,20px);z-index:22;
  width:min(560px,86vw);background:var(--panel);border:1px solid var(--panel-line);
  border-top:3px solid var(--tan);border-radius:18px;padding:30px 34px;
  box-shadow:0 30px 70px rgba(0,0,0,.5);opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease}
#journey.open{opacity:1;transform:translate(-50%,0);pointer-events:auto}
#journey .jk{font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tan);margin-bottom:14px}
#journey .jrow{display:flex;align-items:center;gap:16px;font-family:'EB Garamond',serif;font-size:24px;color:var(--cream);line-height:1.2;margin-bottom:18px;flex-wrap:wrap}
#journey .jarrow{color:var(--tan);font-size:22px}
#journey .jval{background:var(--canvas2);border-radius:12px;padding:14px 18px;font-size:15px;color:var(--teal-mid);line-height:1.45}
#journey .jclose{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
#journey .jclose:hover{color:var(--cream)}
#cta p{margin:0 0 18px;font-size:12px;color:var(--muted)}
.bar{margin-bottom:14px}
.bar .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.bar .top .name{color:var(--mist)}
.bar .top .pct{font-weight:700;color:var(--teal-mid)}
.bar .track{height:8px;background:rgba(217,228,226,.1);border-radius:999px;overflow:hidden}
.bar .fill{height:100%;border-radius:999px;width:0;transition:width .7s cubic-bezier(.4,0,.1,1)}

#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:8;
  font-size:11.5px;color:var(--muted);letter-spacing:.04em;pointer-events:none}
</style>
</head>

/* ---------- build graph model ---------- */
const clusterById = {};
DATA.clusters.forEach(c => clusterById[c.id] = c);

const nodes = DATA.nodes.map(d => Object.assign({}, d));
const nodeById = {};
nodes.forEach(n => nodeById[n.id] = n);

// hub lookup per cluster (for gap-node attachment)
const hubForCluster = {};
nodes.forEach(n => { if (!hubForCluster[n.cluster] && (n.type==='hub'||n.type==='home')) hubForCluster[n.cluster]=n.id; });
nodes.forEach(n => { if (!hubForCluster[n.cluster]) hubForCluster[n.cluster]=n.id; });

// gap nodes
DATA.gapNodes.forEach(g => {
  const c = clusterById[g.cluster] || {color:'#94a3b8', label:g.cluster};
  const gn = {id:g.id, title:g.title, cluster:g.cluster, clusterLabel:c.label,
    color:c.color, words:600, type:'gap', gap:true, issues:['proposed new page'],
    meta:'Recommended new page. Evidence: '+g.evidence};
  nodes.push(gn); nodeById[gn.id]=gn;
});

// edges
let links = [];
DATA.edges.forEach(e => links.push(Object.assign({}, e)));
DATA.proposedBridges.forEach(e => links.push(Object.assign({}, e)));
DATA.gapNodes.forEach(g => links.push({source:g.id, target:hubForCluster[g.cluster], kind:'gaplink'}));

/* ---------- layout: cluster gravity ---------- */
const W = () => window.innerWidth, H = () => window.innerHeight;
const orderedClusters = DATA.clusters.map(c=>c.id);
const ring = orderedClusters.filter(c=>c!=='Core');
const centers = {};
function computeCenters(mode){
  const cx=W()/2, cy=H()/2, R=Math.min(W(),H())*0.34;
  centers['Core']=[cx,cy];
  ring.forEach((c,i)=>{
    const a = (i/ring.length)*2*Math.PI - Math.PI/2;
    let rr = R;
    // dramatise Employment isolation in mode 2
    if(mode===1 && c==='Employment Law') rr = R*1.5;
    centers[c]=[cx+Math.cos(a)*rr, cy+Math.sin(a)*rr];
  });
}
computeCenters(0);

const rScale = d3.scaleSqrt()
  .domain(d3.extent(DATA.nodes, d=>d.words))
  .range([5,30]);
const nodeR = n => n.gap ? 15 : rScale(n.words);

/* ---------- svg ---------- */
const svg = d3.select('#svg');
const g = svg.append('g');
const gLink = g.append('g');
const gNode = g.append('g');

const zoom = d3.zoom().scaleExtent([0.25,4]).on('zoom', ev => g.attr('transform', ev.transform));
svg.call(zoom);

const link = gLink.selectAll('line').data(links).join('line')
  .attr('class', d => 'link '+d.kind)
  .style('cursor', d => d.journey ? 'pointer' : null)
  .on('click', (ev,d)=>{ if(d.journey){ ev.stopPropagation(); showJourney(d); } })
  .attr('stroke', linkStroke)
  .attr('stroke-width', d => d.kind==='contextual' ? Math.min(1+d.weight*0.45,7)
        : d.kind==='proposed' ? 2.4 : 1)
  .attr('stroke-opacity', 0);

function linkStroke(d){
  if(d.kind==='contextual') return d.journey ? 'var(--tan)' : 'var(--teal-mid)';
  if(d.kind==='orphan') return 'var(--red)';
  if(d.kind==='proposed') return 'var(--tan)';
  if(d.kind==='gaplink') return 'var(--tan)';
  return 'rgba(217,228,226,1)';
}

/* journey card */
const journeyEl=document.getElementById('journey');
function showJourney(l){
  document.getElementById('jkicker').textContent = l.kind==='contextual' ? 'The one journey that already works' : 'Client journey · new pathway';
  document.getElementById('jfrom').textContent = l.journey || '';
  document.getElementById('jto').textContent = l.crossSell || '';
  document.getElementById('jvalue').textContent = l.value || '';
  journeyEl.classList.add('open');
}
function closeJourney(){ journeyEl.classList.remove('open'); }
journeyEl.querySelector('.jclose').onclick=closeJourney;

const node = gNode.selectAll('g.node').data(nodes).join('g')
  .attr('class', d => 'node'+(d.gap?' gap':''))
  .call(d3.drag().on('start',dragStart).on('drag',dragged).on('end',dragEnd))
  .on('mouseover', hoverOn).on('mouseout', hoverOff)
  .on('click', (ev,d)=>{ ev.stopPropagation(); openDetail(d); });

node.append('circle').attr('class','warnring')
  .attr('r', d => nodeR(d)+6);

node.append('circle').attr('class','main')
  .attr('r', nodeR)
  .attr('fill', d => d.gap ? 'transparent' : d.color)
  .attr('stroke', d => (d.type==='home'||d.type==='hub') ? 'var(--tan)' : (d.gap?d.color:'rgba(255,255,255,.25)'))
  .attr('stroke-width', d => d.type==='home'?3 : (d.type==='hub'||d.gap)?2 : 1);

node.append('text').attr('class','nlabel')
  .attr('dy', d => -nodeR(d)-7).attr('text-anchor','middle')
  .text(d => d.title.length>34 ? d.title.slice(0,32)+'…' : d.title);

svg.on('click', ()=>{ closeDetail(); closeJourney(); });

/* ---------- simulation ---------- */
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>d.kind==='structural'?46:90).strength(d=>d.kind==='structural'?0.5:0.05))
  .force('charge', d3.forceManyBody().strength(-120))
  .force('collide', d3.forceCollide().radius(d=>nodeR(d)+4))
  .force('x', d3.forceX(d=> (centers[d.cluster]||centers['Core'])[0]).strength(0.14))
  .force('y', d3.forceY(d=> (centers[d.cluster]||centers['Core'])[1]).strength(0.14))
  .on('tick', ticked);

function ticked(){
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform', d=>`translate(${d.x},${d.y})`);
}
function dragStart(ev,d){ if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragged(ev,d){ d.fx=ev.x; d.fy=ev.y; }
function dragEnd(ev,d){ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }

/* ---------- neighbours / hover ---------- */
const adj = {};
nodes.forEach(n=>adj[n.id]=new Set());
links.forEach(l=>{ const s=l.source.id||l.source, t=l.target.id||l.target; adj[s].add(t); adj[t].add(s); });

let isolated = null; // cluster isolate

function hoverOn(ev,d){
  node.classed('focus', n=> n===d);
  node.filter(n=>n===d).raise();
  node.select('.nlabel').style('opacity',n=> (n===d||adj[d.id].has(n.id))?1:0);
  node.select('.main').style('opacity',n=> (n===d||adj[d.id].has(n.id))?1:0.12);
  node.select('.warnring').style('opacity',n=> (n===d||adj[d.id].has(n.id))?null:0);
  link.style('stroke-opacity',l=>{
    const on = (l.source===d||l.target===d);
    return on ? 0.95 : 0.03;
  });
}
function hoverOff(){
  node.classed('focus', false);
  node.select('.nlabel').style('opacity',0);
  applyIsolate();
  applyMode(mode,true);
}

/* ---------- legend ---------- */
const legend = document.getElementById('legend');
DATA.clusters.filter(c=>['About Us','Employment Law','Business Law','Commercial Property','Dispute Resolution','Property Law','Wills and Probate','Blog/News'].includes(c.id))
  .forEach(c=>{
  const el=document.createElement('div'); el.className='chip';
  el.innerHTML='<span class="dot" style="background:'+c.color+'"></span>'+c.label;
  el.onclick=()=>{ isolated = (isolated===c.id)?null:c.id; applyIsolate(); syncChips(); };
  el.dataset.cluster=c.id; legend.appendChild(el);
});
function syncChips(){
  legend.querySelectorAll('.chip').forEach(ch=>{
    ch.classList.toggle('dim', isolated && ch.dataset.cluster!==isolated);
  });
}
function applyIsolate(){
  if(!isolated){ node.select('.main').style('opacity',null); link.style('stroke-opacity',null); applyMode(mode,true); return; }
  node.select('.main').style('opacity',n=> n.cluster===isolated?1:0.08);
  link.style('stroke-opacity',l=>{
    const s=l.source.cluster, t=l.target.cluster;
    return (s===isolated||t===isolated)?0.9:0.02;
  });
}

/* ---------- modes ---------- */
let mode = 0;
const bar = document.getElementById('modebar');
MODES.forEach((m,i)=>{
  const b=document.createElement('button'); b.className='mode'+(i===0?' active':'');
  b.innerHTML='<span class="num">'+m.n+'</span><span class="lbl">'+m.lbl+'</span>';
  b.onclick=()=>setMode(i); bar.appendChild(b);
});
function setMode(i){
  mode=i;
  bar.querySelectorAll('.mode').forEach((b,k)=>b.classList.toggle('active',k===i));
  const r=READOUT[i];
  document.getElementById('kicker').textContent=r.k;
  document.getElementById('caption').textContent=r.cap;
  document.getElementById('stats').innerHTML=r.stats.map(s=>'<div class="stat"><div class="v">'+s[0]+'</div><div class="k">'+s[1]+'</div></div>').join('');
  // caption always visible; legend appears from mode 2 onward
  document.getElementById('legend').style.display = i>=1 ? 'flex' : 'none';
  document.getElementById('readout').style.display = 'block';
  document.getElementById('cta').style.display = i===2 ? 'block':'none';
  if(i===2) drawCTA();
  closeJourney();
  computeCenters(i);
  sim.force('x').x(d=>(centers[d.cluster]||centers['Core'])[0]);
  sim.force('y').y(d=>(centers[d.cluster]||centers['Core'])[1]);
  sim.alpha(0.5).restart();
  applyMode(i,false);
  // mode 2: auto-spotlight the one working bridge (Property → Wills)
  if(i===1){ const b=links.find(l=>l.kind==='contextual'&&l.journey); if(b) setTimeout(()=>showJourney(b),450); }
}
function applyMode(i,soft){
  if(isolated) return; // isolate overrides
  // node visibility for gaps
  node.style('display', d=> (d.gap && i<2) ? 'none' : null);
  node.select('.main')
    .attr('fill', d => d.gap ? (i>=3 ? d.color : 'transparent') : d.color)
    .style('opacity', d => 1);
  node.classed('gap', d=> d.gap && i===2); // pulse only in gaps mode
  // warning rings on thin pages in mode 3
  node.select('.warnring').style('opacity', d=>{
    const thin = d.issues && d.issues.some(x=>x.indexOf('thin')>=0);
    return (i===2 && thin) ? null : 0;
  });
  // links
  link
    .classed('orphan', d => d.kind==='orphan' && i<3)
    .attr('stroke', d => (d.kind==='orphan' && i>=3) ? 'var(--teal-mid)' : linkStroke(d))
    .attr('stroke-dasharray', d => {
       if(d.kind==='proposed') return '7 6';
       if(d.kind==='orphan' && i<3) return '3 5';
       if(d.kind==='gaplink') return '4 6';
       return null;
    })
    .transition().duration(soft?0:400)
    .attr('stroke-opacity', d => linkOpacity(d,i));
}
function linkOpacity(d,i){
  switch(i){
    case 0: // site today
      if(d.kind==='structural') return .2;
      if(d.kind==='contextual') return .55;
      if(d.kind==='orphan') return .4;
      return 0;
    case 1: // island — only contextual bridges lit
      if(d.kind==='contextual') return .92;
      if(d.kind==='structural') return .04;
      return 0;
    case 2: // work you're not showing — proposed preview as faint ghosts
      if(d.kind==='structural') return .11;
      if(d.kind==='contextual') return .4;
      if(d.kind==='orphan') return .4;
      if(d.kind==='gaplink') return .45;
      if(d.kind==='proposed') return .3;
      return 0;
    case 3: // rebuild
      if(d.kind==='structural') return .15;
      if(d.kind==='contextual') return .6;
      if(d.kind==='orphan') return .5; // resolved teal
      if(d.kind==='proposed') return .95;
      if(d.kind==='gaplink') return .6;
      return 0;
  }
}

/* ---------- CTA chart ---------- */
function drawCTA(){
  const h4=document.querySelector('#cta h4');
  h4.textContent='How often we invite the next conversation';
  const box=document.getElementById('ctabars');
  const entries=Object.entries(DATA.ctaCoverage).sort((a,b)=>b[1]-a[1]);
  box.innerHTML=entries.map(([k,v])=>{
    const pct=Math.round(v*100);
    const col = v<0.15?'var(--red)':v<0.5?'var(--tan)':'var(--teal)';
    return '<div class="bar"><div class="top"><span class="name">'+k+'</span><span class="pct" style="color:'+col+'">'+pct+'%</span></div>'+
      '<div class="track"><div class="fill" data-w="'+pct+'" style="background:'+col+'"></div></div></div>';
  }).join('');
  requestAnimationFrame(()=>box.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'));
}

/* ---------- detail panel ---------- */
const detail=document.getElementById('detail');
function openDetail(d){
  document.getElementById('detclustername').textContent=d.clusterLabel;
  document.querySelector('#detcluster .dot').style.background=d.color;
  document.getElementById('detcluster').style.color=d.color;
  document.getElementById('dettitle').textContent=d.title;
  document.getElementById('detpath').textContent=d.gap?'— not yet created —':d.id;
  document.getElementById('detwords').textContent=d.gap?'—':d.words.toLocaleString();
  document.getElementById('dettype').textContent=({home:'Home',hub:'Hub',page:'Spoke',gap:'Gap'})[d.type]||d.type;
  const ul=document.getElementById('detissues');
  if(d.issues && d.issues.length){
    ul.innerHTML=d.issues.map(x=>'<li>'+x+'</li>').join('');
  } else { ul.innerHTML='<li class="clean">No issues detected</li>'; }
  document.getElementById('detmeta').textContent=d.meta||'—';
  detail.classList.add('open');
}
function closeDetail(){ detail.classList.remove('open'); }
document.getElementById('detclose').onclick=closeDetail;

/* ---------- search ---------- */
const sbox=document.getElementById('searchbox'), results=document.getElementById('results');
sbox.addEventListener('input',()=>{
  const q=sbox.value.trim().toLowerCase();
  if(!q){ results.style.display='none'; return; }
  const hits=nodes.filter(n=>n.title.toLowerCase().includes(q)).slice(0,12);
  results.innerHTML=hits.map(n=>'<div class="res" data-id="'+n.id+'"><span class="d" style="background:'+n.color+'"></span><span class="t">'+n.title+'</span></div>').join('');
  results.style.display=hits.length?'block':'none';
  results.querySelectorAll('.res').forEach(r=>r.onclick=()=>{ goTo(nodeById[r.dataset.id]); results.style.display='none'; sbox.value=nodeById[r.dataset.id].title; });
});
document.addEventListener('click',e=>{ if(!document.getElementById('search').contains(e.target)) results.style.display='none'; });
function goTo(d){
  if(mode<2 && d.gap) setMode(2);
  const k=1.9, tx=W()/2-d.x*k, ty=H()/2-d.y*k;
  svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(k));
  openDetail(d);
  node.select('.main').transition().duration(200).attr('stroke-width',n=>n===d?4:(n.type==='home'?3:(n.type==='hub'||n.gap)?2:1));
}

/* ---------- keyboard ---------- */
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){ setMode(Math.min(mode+1,3)); }
  if(e.key==='ArrowLeft'){ setMode(Math.max(mode-1,0)); }
  if(e.key==='Escape'){ closeDetail(); closeJourney(); results.style.display='none'; }
});

/* ---------- resize ---------- */
window.addEventListener('resize',()=>{ computeCenters(mode);
  sim.force('x').x(d=>(centers[d.cluster]||centers['Core'])[0]);
  sim.force('y').y(d=>(centers[d.cluster]||centers['Core'])[1]);
  sim.alpha(0.3).restart();
});

/* ---------- boot ---------- */
setMode(0);
setTimeout(()=>{ // gentle initial fit
  const t=d3.zoomIdentity.translate(W()*0.02,H()*0.02).scale(0.92);
  svg.transition().duration(600).call(zoom.transform,t);
}, 400);
</script>
</body>
</html>
